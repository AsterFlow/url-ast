name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches:
      - docs
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Baixa a branch 'main' na pasta 'main-repo'
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: 'main'
          path: 'main-repo'

      # Baixa a branch 'docs' na pasta 'docs-repo'
      - name: Checkout docs branch
        uses: actions/checkout@v4
        with:
          ref: 'docs'
          path: 'docs-repo'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Instala dependências da biblioteca principal
      - name: Install dependencies (Main Repository)
        working-directory: ./main-repo
        run: bun install

      # Instala dependências do Docusaurus (agora apontando para a pasta correta)
      - name: Install dependencies (Docusaurus)
        working-directory: ./docs-repo
        run: bun install

      # Executa o build do Docusaurus
      - name: Build Docusaurus Site
        working-directory: ./docs-repo
        run: bun run build

